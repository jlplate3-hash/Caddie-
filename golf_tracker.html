<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caddie</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a5c2a; --green-light: #2d8c46; --fairway: #3aaf5c;
    --gold: #c9a84c; --white: #f5f2eb; --dark: #0d1a10;
    --panel: rgba(13,26,16,0.95); --radius: 12px;
  }
  html, body { height: 100%; overflow: hidden; background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--white); }
  #map { position: fixed; inset: 0; z-index: 0; }
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(13,26,16,0.98) 70%, transparent);
  }
  #logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
  #hole-info { display: flex; align-items: center; gap: 10px; }
  .info-chip { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 12px; }
  .info-chip span { color: var(--gold); font-weight: 500; }
  #btn-settings { background: none; border: none; color: var(--white); font-size: 22px; cursor: pointer; }
  #bottom-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel); border-top: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px 20px 0 0; padding: 16px 16px 36px;
  }
  #panel-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 16px; }
  #club-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
  #club-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  #club-scroll::-webkit-scrollbar { display: none; }
  .club-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: var(--white); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
  .club-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 500; }
  #action-row { display: flex; gap: 10px; align-items: center; }
  #btn-track { flex: 1; padding: 16px; border-radius: var(--radius); border: none; background: var(--fairway); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; cursor: pointer; box-shadow: 0 4px 20px rgba(58,175,92,0.3); }
  #btn-undo { padding: 16px 18px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: var(--white); font-size: 18px; cursor: pointer; }
  #btn-next { padding: 16px 14px; border-radius: var(--radius); border: 1px solid rgba(201,168,76,0.3); background: rgba(201,168,76,0.1); color: var(--gold); font-size: 18px; cursor: pointer; }
  #status-bar { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
  #gps-status { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); }
  #gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
  #gps-dot.active { background: var(--fairway); animation: pulse 2s infinite; }
  #gps-dot.error { background: #e05555; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  #shot-count { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); }
  #shot-count span { color: var(--gold); }
  #scorecard-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(13,26,16,0.97); display: none; flex-direction: column; padding: 24px 16px; overflow-y: auto; }
  #scorecard-overlay.open { display: flex; }
  #scorecard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  #scorecard-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: var(--gold); }
  #btn-close-sc { background: none; border: none; color: var(--white); font-size: 28px; cursor: pointer; }
  .hole-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .hole-card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .hole-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 2px; }
  .hole-shots { font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.5); }
  .shot-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .shot-row:last-child { border-bottom: none; }
  .shot-num { font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.4); font-size: 11px; }
  .shot-dist { font-family: 'DM Mono', monospace; color: var(--fairway); font-size: 12px; }
  #btn-export { margin-top: 20px; padding: 14px 32px; border-radius: var(--radius); border: 1px solid rgba(201,168,76,0.3); background: transparent; color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; }
  #start-modal { position: fixed; inset: 0; z-index: 3000; background: rgba(13,26,16,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
  #start-modal h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 6px; color: var(--gold); margin-bottom: 8px; }
  #start-modal p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  #course-input { width: 100%; max-width: 380px; padding: 14px 16px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; margin-bottom: 12px; text-align: center; }
  #course-input::placeholder { color: rgba(255,255,255,0.25); }
  #btn-start { width: 100%; max-width: 380px; padding: 18px; border-radius: var(--radius); border: none; background: var(--fairway); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; cursor: pointer; }
  #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--green); border: 1px solid var(--fairway); color: white; padding: 10px 20px; border-radius: 30px; font-family: 'DM Mono', monospace; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 1500; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .leaflet-container { background: #1a2e1e; }
</style>
</head>
<body>

<div id="start-modal">
  <h1>CADDIE</h1>
  <p>GPS shot tracker with satellite map.<br>Open this on the course — map centers on you.</p>
  <input id="course-input" type="text" placeholder="Course name (optional)" />
  <button id="btn-start" onclick="startRound()">START ROUND</button>
</div>

<div id="map"></div>

<div id="topbar">
  <div id="logo">CADDIE</div>
  <div id="hole-info"><div class="info-chip">HOLE <span id="current-hole">1</span></div></div>
  <button id="btn-settings" onclick="openScorecard()">📋</button>
</div>

<div id="bottom-panel">
  <div id="panel-handle"></div>
  <div id="club-label">Select Club</div>
  <div id="club-scroll"></div>
  <div id="action-row">
    <button id="btn-undo" onclick="undoShot()">↩</button>
    <button id="btn-track" onclick="trackShot()">TRACK SHOT</button>
    <button id="btn-next" onclick="nextHole()">▶</button>
  </div>
  <div id="status-bar">
    <div id="gps-status"><div id="gps-dot"></div><span id="gps-text">Acquiring GPS...</span></div>
    <div id="shot-count">SHOTS: <span id="shot-num">0</span></div>
  </div>
</div>

<div id="scorecard-overlay">
  <div id="scorecard-header">
    <div id="scorecard-title">SCORECARD</div>
    <button id="btn-close-sc" onclick="closeScorecard()">✕</button>
  </div>
  <div id="scorecard-body"></div>
  <button id="btn-export" onclick="exportRound()">EXPORT CSV</button>
</div>

<div id="toast"></div>

<script>
const CLUBS = ['Driver','3W','5W','4i','5i','6i','7i','8i','9i','PW','GW','SW','LW','Putter'];
let map, gpsMarker, currentPos = null, selectedClub = 'Driver';
let currentHole = 1, shots = [], holeShots = [], lastShotPos = null;
let shotMarkers = [], shotLines = [], courseName = '';

function startRound() {
  courseName = document.getElementById('course-input').value.trim() || 'Golf Round';
  document.getElementById('start-modal').style.display = 'none';

  map = L.map('map', { zoomControl: false, attributionControl: false });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 20
  }).addTo(map);

  map.setView([42.36, -71.05], 17);

  gpsMarker = L.circleMarker([42.36, -71.05], {
    radius: 10, fillColor: '#4a90e2', fillOpacity: 1, color: 'white', weight: 2
  }).addTo(map);

  startGPS();
}

function startGPS() {
  if (!navigator.geolocation) { setGPS('error', 'GPS not supported'); return; }
  let centered = false;
  navigator.geolocation.watchPosition(pos => {
    currentPos = [pos.coords.latitude, pos.coords.longitude];
    setGPS('active', `±${Math.round(pos.coords.accuracy)}m`);
    gpsMarker.setLatLng(currentPos);
    if (!centered) { map.setView(currentPos, 18); centered = true; }
  }, () => setGPS('error', 'GPS error — allow location access'), { enableHighAccuracy: true, maximumAge: 3000 });
}

function setGPS(state, text) {
  document.getElementById('gps-dot').className = state;
  document.getElementById('gps-text').textContent = text;
}

function trackShot() {
  if (!currentPos) { showToast('Waiting for GPS...'); return; }
  const shotNum = holeShots.length + 1;
  let distYards = 0;
  if (lastShotPos) {
    distYards = Math.round(haversineYards(lastShotPos, currentPos));
    shotLines.push(L.polyline([lastShotPos, currentPos], { color: '#3aaf5c', weight: 3, opacity: 0.9 }).addTo(map));
  }
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:#c9a84c;color:#0d1a10;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:12px;font-weight:bold;border:2px solid #0d1a10;box-shadow:0 2px 6px rgba(0,0,0,0.5)">${shotNum}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14]
  });
  const marker = L.marker(currentPos, { icon }).addTo(map);
  marker.bindPopup(`Shot ${shotNum}: ${selectedClub}${distYards > 0 ? ' · ' + distYards + 'y' : ''}`);
  shotMarkers.push(marker);
  const shot = { hole: currentHole, shotNum, club: selectedClub, lat: currentPos[0], lng: currentPos[1], distYards };
  holeShots.push(shot); shots.push(shot); lastShotPos = [...currentPos];
  updateCount();
  showToast(`Shot ${shotNum} — ${selectedClub}${distYards > 0 ? ' · ' + distYards + 'y' : ''}`);
}

function undoShot() {
  if (!holeShots.length) { showToast('No shots to undo'); return; }
  holeShots.pop(); shots.pop();
  const m = shotMarkers.pop(); if (m) map.removeLayer(m);
  const l = shotLines.pop(); if (l) map.removeLayer(l);
  lastShotPos = holeShots.length ? [holeShots[holeShots.length-1].lat, holeShots[holeShots.length-1].lng] : null;
  updateCount(); showToast('Shot removed');
}

function nextHole() {
  if (!holeShots.length) { showToast('Track a shot first'); return; }
  currentHole++; holeShots = []; lastShotPos = null;
  document.getElementById('current-hole').textContent = currentHole;
  updateCount(); showToast(`Hole ${currentHole}`);
}

function updateCount() { document.getElementById('shot-num').textContent = holeShots.length; }
function openScorecard() { buildScorecard(); document.getElementById('scorecard-overlay').classList.add('open'); }
function closeScorecard() { document.getElementById('scorecard-overlay').classList.remove('open'); }

function buildScorecard() {
  const body = document.getElementById('scorecard-body');
  if (!shots.length) { body.innerHTML = '<p style="color:rgba(255,255,255,0.3);text-align:center;padding:40px 0;">No shots yet</p>'; return; }
  const byHole = {};
  shots.forEach(s => { if (!byHole[s.hole]) byHole[s.hole] = []; byHole[s.hole].push(s); });
  body.innerHTML = Object.entries(byHole).map(([hole, hs]) => `
    <div class="hole-card">
      <div class="hole-card-header"><div class="hole-num">HOLE ${hole}</div><div class="hole-shots">${hs.length} shots · ${hs.reduce((a,s)=>a+s.distYards,0)}y</div></div>
      ${hs.map(s=>`<div class="shot-row"><span class="shot-num">#${s.shotNum}</span><span>${s.club}</span><span class="shot-dist">${s.distYards>0?s.distYards+'y':'—'}</span></div>`).join('')}
    </div>`).join('');
}

function exportRound() {
  if (!shots.length) { showToast('No shots to export'); return; }
  let csv = `Caddie\n${courseName}\n${new Date().toLocaleDateString()}\n\nHole,Shot,Club,Yards,Lat,Lng\n`;
  shots.forEach(s => { csv += `${s.hole},${s.shotNum},${s.club},${s.distYards},${s.lat.toFixed(6)},${s.lng.toFixed(6)}\n`; });
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `caddie_${courseName.replace(/\s+/g,'_')}.csv`; a.click(); showToast('Exported');
}

function haversineYards(a, b) {
  const R = 6371000, dLat=(b[0]-a[0])*Math.PI/180, dLng=(b[1]-a[1])*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*1.09361;
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

const scroll = document.getElementById('club-scroll');
CLUBS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'club-btn' + (c===selectedClub?' active':'');
  btn.textContent = c;
  btn.onclick = () => { selectedClub = c; document.querySelectorAll('.club-btn').forEach(b=>b.classList.toggle('active',b.textContent===c)); };
  scroll.appendChild(btn);
});
</script>
</body>
</html>
