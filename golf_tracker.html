<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caddie</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #c9a84c; --green: #3aaf5c; --dark: #0a140c;
  --panel: rgba(10,20,12,0.96); --border: rgba(255,255,255,0.1);
  --red: #e05555; --blue: #4a90e2; --white: #f0ede6;
  --radius: 12px;
}
html, body { height: 100%; background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; overflow: hidden; }

/* PAGE SYSTEM */
.page { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--dark); overflow: hidden; }
.page.active { display: flex; }

/* ── HOME PAGE ── */
#home-page { overflow-y: auto; }
#home-hdr { padding: 50px 20px 12px; }
#home-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 6px; color: var(--gold); }
#home-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 3px; margin-top: 2px; }
#home-content { padding: 0 16px 60px; }
.label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin: 16px 0 8px; }

/* Search */
#search-input { width: 100%; padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: rgba(255,255,255,0.06); color: var(--white); font-size: 16px; outline: none; margin-bottom: 8px; }
#search-input::placeholder { color: rgba(255,255,255,0.2); }
#search-input:focus { border-color: rgba(201,168,76,0.5); }

/* State tabs */
#state-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.stab { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }
.stab.on { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 600; }

/* Course list */
.citem { padding: 13px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: rgba(255,255,255,0.04); margin-bottom: 7px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; }
.citem:active { background: rgba(255,255,255,0.1); }
.citem-name { font-size: 14px; font-weight: 500; }
.citem-town { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.citem-right { display: flex; align-items: center; gap: 8px; }
.cstate { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }
.cstar { color: var(--gold); font-size: 14px; }
.cchev { color: rgba(255,255,255,0.2); }

/* Saved */
.sitem { padding: 13px 14px; border-radius: var(--radius); border: 1px solid rgba(58,175,92,0.2); background: rgba(58,175,92,0.04); margin-bottom: 7px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.sitem:active { background: rgba(58,175,92,0.1); }
.sitem-info {}
.sitem-name { font-size: 14px; font-weight: 500; }
.sitem-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
.sitem-pins { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); }
.sdel { background: none; border: none; color: rgba(255,255,255,0.2); font-size: 16px; cursor: pointer; padding: 6px; }
#no-results { text-align: center; padding: 24px; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.2); display: none; }

/* ── PLAY PAGE ── */
#play-page { position: fixed; inset: 0; }
#map { position: absolute; inset: 0; z-index: 1; }

/* TOP BAR */
#play-top { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 44px 14px 10px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(10,20,12,0.97) 60%, transparent); }
#play-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--gold); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#play-chips { display: flex; gap: 6px; }
.chip { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 11px; backdrop-filter: blur(8px); }
.chip b { color: var(--gold); }
#btn-exit { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.5); cursor: pointer; backdrop-filter: blur(8px); }

/* WEATHER */
#wx-bar { position: absolute; top: 88px; left: 0; right: 0; z-index: 10; display: flex; gap: 12px; padding: 5px 14px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.45); overflow-x: auto; scrollbar-width: none; }
#wx-bar::-webkit-scrollbar { display: none; }
.wx { white-space: nowrap; }
.wx b { color: var(--white); }

/* HOLE STRIP */
#hole-strip { position: absolute; top: 117px; left: 0; right: 0; z-index: 10; display: flex; gap: 5px; padding: 5px 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); overflow-x: auto; scrollbar-width: none; }
#hole-strip::-webkit-scrollbar { display: none; }
.hpill { flex-shrink: 0; padding: 5px 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }
.hpill.cur { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 700; }
.hpill.done { border-color: rgba(58,175,92,0.4); color: rgba(58,175,92,0.8); }
.hpill.has-pin { border-color: rgba(58,175,92,0.3); }

/* DISTANCE PANEL */
#dist-box { position: absolute; top: 155px; right: 12px; z-index: 10; background: rgba(0,0,0,0.8); border: 1px solid rgba(201,168,76,0.35); border-radius: var(--radius); padding: 10px 14px; text-align: center; backdrop-filter: blur(10px); display: none; min-width: 86px; }
#dist-num { font-family: 'Bebas Neue', sans-serif; font-size: 46px; color: var(--gold); line-height: 1; }
.dist-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 1px; }
#dist-plays { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green); margin-top: 5px; }

/* MEASURE PANEL */
#meas-box { position: absolute; top: 155px; left: 12px; z-index: 10; background: rgba(0,0,0,0.8); border: 1px solid rgba(74,144,226,0.35); border-radius: var(--radius); padding: 10px 14px; text-align: center; backdrop-filter: blur(10px); display: none; min-width: 86px; }
#meas-num { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--blue); line-height: 1; }
.meas-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(74,144,226,0.5); margin-top: 4px; line-height: 1.4; }

/* BOTTOM PANEL */
#play-btm { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; background: rgba(10,20,12,0.97); border-top: 1px solid rgba(201,168,76,0.12); border-radius: 20px 20px 0 0; padding: 12px 14px 28px; }
#handle { width: 30px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; margin: 0 auto 12px; }
#club-lbl { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.25); margin-bottom: 6px; }
#clubs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 11px; scrollbar-width: none; }
#clubs::-webkit-scrollbar { display: none; }
.cbt { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--white); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
.cbt.on { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 700; }

#actions { display: flex; gap: 6px; margin-bottom: 9px; }
#btn-track { flex: 1; padding: 15px; border-radius: var(--radius); border: none; background: var(--green); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; }
#btn-track:active { opacity: 0.85; }
.abt { padding: 15px 11px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; cursor: pointer; text-align: center; line-height: 1.4; min-width: 44px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--white); }
#btn-undo { padding: 15px 13px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: var(--white); font-size: 17px; cursor: pointer; }
#btn-pin { border-color: rgba(201,168,76,0.25); background: rgba(201,168,76,0.05); color: var(--gold); }
#btn-pin.on { background: rgba(201,168,76,0.2); border-color: var(--gold); }
#btn-meas { border-color: rgba(74,144,226,0.25); background: rgba(74,144,226,0.05); color: var(--blue); }
#btn-meas.on { background: rgba(74,144,226,0.2); border-color: var(--blue); }
#btn-next { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45); font-size: 17px; padding: 15px 12px; cursor: pointer; border-radius: var(--radius); }

#info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
#gps-row { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); }
#gdot { width: 7px; height: 7px; border-radius: 50%; background: #444; }
#gdot.ok { background: var(--green); animation: blink 2s infinite; }
#gdot.err { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
#cat-row { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); }
#cat-row b { color: var(--gold); }

/* TAB BAR */
#tabs { display: flex; border-top: 1px solid rgba(255,255,255,0.05); margin: 0 -14px -28px; }
.tab { flex: 1; padding: 9px 2px 3px; text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.28); cursor: pointer; border: none; background: none; letter-spacing: 1px; }
.tab-ic { font-size: 14px; display: block; margin-bottom: 1px; }

/* OVERLAYS */
.ov { position: fixed; inset: 0; z-index: 200; background: rgba(10,20,12,0.98); display: none; flex-direction: column; }
.ov.open { display: flex; }
.ov-top { display: flex; justify-content: space-between; align-items: center; padding: 50px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.ov-ttl { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
.ov-x { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 24px; cursor: pointer; }
.ov-body { flex: 1; overflow-y: auto; padding: 16px; }
.hcard { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.hcard-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.hcard-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
.hcard-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); text-align: right; }
.srow { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; gap: 6px; }
.srow:last-child { border-bottom: none; }
.sbadge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 10px; flex-shrink: 0; }
.sbadge.tee { background: rgba(74,144,226,0.15); color: #4a90e2; }
.sbadge.approach { background: rgba(58,175,92,0.15); color: #3aaf5c; }
.sbadge.chip { background: rgba(201,168,76,0.15); color: #c9a84c; }
.sbadge.putt { background: rgba(155,89,182,0.15); color: #9b59b6; }
.sdist { font-family: 'DM Mono', monospace; color: var(--green); font-size: 12px; }
.sgv { font-family: 'DM Mono', monospace; font-size: 12px; }
.sgv.pos { color: var(--green); } .sgv.neg { color: var(--red); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-c { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 14px; }
.stat-v { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--gold); }
.stat-l { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.sg-block { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.sg-ttl { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 12px; letter-spacing: 1px; }
.sg-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.sg-lbl { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); width: 72px; flex-shrink: 0; }
.sg-track { flex: 1; height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
.sg-fill { height: 100%; border-radius: 3px; }
.sg-fill.pos { background: var(--green); } .sg-fill.neg { background: var(--red); }
.sg-n { font-family: 'DM Mono', monospace; font-size: 11px; width: 44px; text-align: right; flex-shrink: 0; }
.sg-n.pos { color: var(--green); } .sg-n.neg { color: var(--red); }
#btn-export { width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid rgba(201,168,76,0.25); background: transparent; color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 8px; }

/* TOAST */
#toast { position: fixed; top: 110px; left: 50%; transform: translateX(-50%) translateY(-16px); background: rgba(26,80,36,0.95); border: 1px solid var(--green); color: white; padding: 8px 18px; border-radius: 30px; font-family: 'DM Mono', monospace; font-size: 12px; opacity: 0; transition: all 0.25s; z-index: 9999; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.leaflet-container { background: #111a13 !important; }
</style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="home-page">
  <div id="home-hdr">
    <div id="home-logo">CADDIE</div>
    <div id="home-sub">NEW ENGLAND GPS SHOT TRACKER</div>
  </div>
  <div id="home-content">
    <div class="label">Find Course</div>
    <input id="search-input" type="text" placeholder="Type course name or town..." oninput="filterList()" autocomplete="off">
    <div id="state-tabs">
      <button class="stab on" onclick="setTab('ALL',this)">All</button>
      <button class="stab" onclick="setTab('NH',this)">NH</button>
      <button class="stab" onclick="setTab('MA',this)">MA</button>
      <button class="stab" onclick="setTab('VT',this)">VT</button>
      <button class="stab" onclick="setTab('ME',this)">ME</button>
    </div>
    <div id="course-list"></div>
    <div id="no-results">No courses found</div>
    <div class="label">Saved Courses</div>
    <div id="saved-list"></div>
  </div>
</div>

<!-- PLAY -->
<div class="page" id="play-page">
  <div id="map"></div>
  <div id="play-top">
    <div id="play-name">CADDIE</div>
    <div id="play-chips">
      <div class="chip">H<b id="h-num">1</b></div>
      <div class="chip">SG <b id="sg-num">+0.0</b></div>
    </div>
    <button id="btn-exit" onclick="exitRound()">⌂ HOME</button>
  </div>
  <div id="wx-bar">
    <span class="wx">🌡 <b id="wx-t">--</b></span>
    <span class="wx">💨 <b id="wx-w">--</b></span>
    <span class="wx">🧭 <b id="wx-d">--</b></span>
    <span class="wx">💧 <b id="wx-h">--</b></span>
    <span class="wx" id="wx-pl" style="display:none">▶ plays <b id="wx-plv">--</b></span>
  </div>
  <div id="hole-strip"></div>
  <div id="dist-box">
    <div class="dist-lbl">TO PIN</div>
    <div id="dist-num">---</div>
    <div class="dist-lbl">YDS</div>
    <div id="dist-plays">---y plays like</div>
  </div>
  <div id="meas-box">
    <div id="meas-num">---</div>
    <div class="dist-lbl">YARDS</div>
    <div class="meas-hint">Drag blue dot<br>to measure</div>
  </div>
  <div id="play-btm">
    <div id="handle"></div>
    <div id="club-lbl">SELECT CLUB</div>
    <div id="clubs"></div>
    <div id="actions">
      <button id="btn-undo" onclick="undoShot()">↩</button>
      <button id="btn-track" onclick="trackShot()">TRACK SHOT</button>
      <button class="abt" id="btn-pin" onclick="setPin()">📍<br>PIN</button>
      <button class="abt" id="btn-meas" onclick="toggleMeasure()">📏<br>MEAS</button>
      <button id="btn-next" onclick="nextHole()">▶</button>
    </div>
    <div id="info-row">
      <div id="gps-row"><div id="gdot"></div><span id="gtxt">Acquiring GPS...</span></div>
      <div id="cat-row">TYPE: <b id="cat-txt">TEE</b></div>
    </div>
    <div id="tabs">
      <button class="tab" onclick="openOv('sc-ov')"><span class="tab-ic">📋</span>CARD</button>
      <button class="tab" onclick="openOv('stats-ov')"><span class="tab-ic">📊</span>STATS</button>
      <button class="tab" onclick="toggleRings()"><span class="tab-ic">🎯</span>RINGS</button>
      <button class="tab" onclick="saveCourse()"><span class="tab-ic">💾</span>SAVE</button>
    </div>
  </div>
</div>

<!-- SCORECARD -->
<div class="ov" id="sc-ov">
  <div class="ov-top"><div class="ov-ttl">SCORECARD</div><button class="ov-x" onclick="closeOv('sc-ov')">✕</button></div>
  <div class="ov-body" id="sc-body"></div>
</div>
<!-- STATS -->
<div class="ov" id="stats-ov">
  <div class="ov-top"><div class="ov-ttl">ANALYTICS</div><button class="ov-x" onclick="closeOv('stats-ov')">✕</button></div>
  <div class="ov-body" id="stats-body"></div>
</div>

<div id="toast"></div>

// ── HOME ──────────────────────────────────────────────────────────────────
function setTab(s, btn) {
  stateFilter = s;
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  filterList();
}

function filterList() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const el = document.getElementById('course-list');
  const none = document.getElementById('no-results');
  const savedNames = new Set(lib.map(c => c.n));
  let results = DB.filter(c => {
    const ms = stateFilter === 'ALL' || c.s === stateFilter;
    const mq = !q || c.n.toLowerCase().includes(q) || c.t.toLowerCase().includes(q);
    return ms && mq;
  }).slice(0, 25);
  if (!results.length) { el.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';
  el.innerHTML = results.map(c => `
    <div class="citem" onclick="pickCourse('${c.n.replace(/'/g,"\\'")}',${c.la},${c.lo},'${c.s}','${c.t.replace(/'/g,"\\'")}')">
      <div>
        <div class="citem-name">${c.n}</div>
        <div class="citem-town">${c.t}</div>
      </div>
      <div class="citem-right">
        <span class="cstate">${c.s}</span>
        ${savedNames.has(c.n) ? '<span class="cstar">★</span>' : ''}
        <span class="cchev">›</span>
      </div>
    </div>`).join('');
}

function renderSaved() {
  const el = document.getElementById('saved-list');
  if (!lib.length) { el.innerHTML = '<div style="font-family:DM Mono,monospace;font-size:11px;color:rgba(255,255,255,0.2);padding:8px 0">No saved courses</div>'; return; }
  el.innerHTML = lib.map((c, i) => `
    <div class="sitem" onclick="pickCourse('${c.n.replace(/'/g,"\\'")}',${c.la},${c.lo},'${c.s||''}','${(c.t||'').replace(/'/g,"\\'")}')">
      <div class="sitem-info">
        <div class="sitem-name">${c.n}</div>
        <div class="sitem-meta">${c.t || ''} ${c.s || ''}</div>
        <div class="sitem-pins">${Object.keys(c.pins||{}).length} pins · ${Object.keys(c.tees||{}).length} tees</div>
      </div>
      <button class="sdel" onclick="event.stopPropagation();delSaved(${i})">🗑</button>
    </div>`).join('');
}

function delSaved(i) { lib.splice(i, 1); localStorage.setItem('caddie_lib', JSON.stringify(lib)); renderSaved(); }

function pickCourse(name, la, lo, st, town) {
  const existing = lib.find(c => c.n === name);
  if (existing) {
    activeCourse = existing;
  } else {
    activeCourse = { n: name, la, lo, s: st, t: town, pins: {}, tees: {} };
    lib.unshift(activeCourse);
    localStorage.setItem('caddie_lib', JSON.stringify(lib));
  }
  pins = Object.assign({}, activeCourse.pins || {});
  tees = Object.assign({}, activeCourse.tees || {});
  launchRound(la, lo, name);
}

// ── LAUNCH ────────────────────────────────────────────────────────────────
function launchRound(la, lo, name) {
  // Reset state
  hole = 1; shots = []; hShots = []; lastPos = null;
  sMarkers = []; sLines = []; pinM = {}; teeM = {};
  rings = []; ringsOn = false; measMode = false;

  // Show play page FIRST
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('play-page').classList.add('active');
  document.getElementById('play-name').textContent = name.substring(0, 18);
  document.getElementById('h-num').textContent = '1';

  // Build UI
  buildClubs();
  buildHoleStrip();

  // Init map AFTER page is visible using requestAnimationFrame
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      initMap(la, lo);
    });
  });
}

// ── MAP ────────────────────────────────────────────────────────────────────
function initMap(la, lo) {
  if (map) { map.remove(); map = null; }

  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
  map.setView([la, lo], 17);

  // GPS dot
  gpsMarker = L.circleMarker([la, lo], {
    radius: 10, fillColor: '#4a90e2', fillOpacity: 1,
    color: 'white', weight: 2, zIndexOffset: 1000
  }).addTo(map);

  // Measure marker
  measMarker = L.marker([la, lo], {
    draggable: true,
    icon: L.divIcon({
      className: '',
      html: '<div style="width:22px;height:22px;background:#4a90e2;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.7)"></div>',
      iconSize: [22, 22], iconAnchor: [11, 11]
    })
  });
  measMarker.on('drag', onMeasDrag);

  // Force Leaflet to recalculate size
  map.invalidateSize();

  // Draw saved pins and tees
  Object.keys(pins).forEach(h => drawPin(parseInt(h), pins[h]));
  Object.keys(tees).forEach(h => drawTee(parseInt(h), tees[h]));

  // Start GPS
  startGPS();

  // Load course overlay
  loadOverlay(la, lo);
}

// ── GPS ────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { setGPS('err', 'GPS not supported'); return; }
  let centered = false;
  navigator.geolocation.watchPosition(function(pos) {
    currentPos = [pos.coords.latitude, pos.coords.longitude];
    altitude = pos.coords.altitude ? pos.coords.altitude * 3.28084 : 0;
    setGPS('ok', '±' + Math.round(pos.coords.accuracy) + 'm');
    if (gpsMarker) gpsMarker.setLatLng(currentPos);
    if (!centered) {
      map.setView(currentPos, 18);
      centered = true;
      fetchWeather(pos.coords.latitude, pos.coords.longitude);
    }
    updateDist();
    updateCat();
  }, function() {
    setGPS('err', 'Allow location access');
  }, { enableHighAccuracy: true, maximumAge: 3000 });
}

function setGPS(s, t) {
  document.getElementById('gdot').className = s;
  document.getElementById('gtxt').textContent = t;
}

// ── WEATHER ────────────────────────────────────────────────────────────────
async function fetchWeather(lat, lng) {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&wind_speed_unit=mph&temperature_unit=fahrenheit`);
    const d = await r.json();
    weather = d.current;
    document.getElementById('wx-t').textContent = Math.round(weather.temperature_2m) + '°F';
    document.getElementById('wx-w').textContent = Math.round(weather.wind_speed_10m) + 'mph';
    document.getElementById('wx-d').textContent = ['N','NE','E','SE','S','SW','W','NW'][Math.round(weather.wind_direction_10m / 45) % 8];
    document.getElementById('wx-h').textContent = weather.relative_humidity_2m + '%';
  } catch(e) {}
}

function playsLike(y) {
  if (!y) return y;
  let a = y;
  a -= (altitude / 1000) * y * 0.01;
  if (weather) {
    a += ((75 - weather.temperature_2m) / 10) * y * 0.01;
    a += weather.wind_speed_10m * 0.35;
  }
  return Math.round(a);
}

// ── OVERLAY ────────────────────────────────────────────────────────────────
async function loadOverlay(la, lo) {
  try {
    const q = `[out:json][timeout:20];(way["golf"="fairway"](around:2000,${la},${lo});way["golf"="green"](around:2000,${la},${lo});way["golf"="tee"](around:2000,${la},${lo});way["golf"="bunker"](around:2000,${la},${lo});way["golf"="water_hazard"](around:2000,${la},${lo}););out body;>;out skel qt;`;
    const r = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: q });
    const data = await r.json();
    const nodes = {};
    data.elements.filter(e => e.type === 'node').forEach(n => { nodes[n.id] = [n.lat, n.lon]; });
    let gc = 0;
    data.elements.filter(e => e.type === 'way' && e.tags).forEach(w => {
      const coords = (w.nodes || []).map(id => nodes[id]).filter(Boolean);
      if (!coords.length) return;
      const g = w.tags.golf;
      if (g === 'fairway') L.polygon(coords, { color: '#3aaf5c', weight: 1, opacity: 0.5, fillColor: '#3aaf5c', fillOpacity: 0.12 }).addTo(map);
      else if (g === 'green') {
        gc++;
        L.polygon(coords, { color: '#6de88a', weight: 1.5, opacity: 0.7, fillColor: '#5dde7a', fillOpacity: 0.22 }).addTo(map);
        const ctr = [coords.reduce((s,c)=>s+c[0],0)/coords.length, coords.reduce((s,c)=>s+c[1],0)/coords.length];
        const hNum = w.tags.ref ? parseInt(w.tags.ref) : gc;
        if (hNum >= 1 && hNum <= 18 && !pins[hNum]) { pins[hNum] = ctr; drawPin(hNum, ctr); buildHoleStrip(); }
      }
      else if (g === 'tee') L.polygon(coords, { color: '#4a90e2', weight: 1, opacity: 0.5, fillColor: '#4a90e2', fillOpacity: 0.18 }).addTo(map);
      else if (g === 'bunker') L.polygon(coords, { color: '#c8b560', weight: 1, opacity: 0.5, fillColor: '#d4c46a', fillOpacity: 0.2 }).addTo(map);
      else if (g === 'water_hazard') L.polygon(coords, { color: '#4a90e2', weight: 1, opacity: 0.4, fillColor: '#4a90e2', fillOpacity: 0.25 }).addTo(map);
    });
    if (gc > 0) showToast('Course loaded · ' + gc + ' greens');
    else showToast('Map loaded · Set pins manually');
  } catch(e) {
    showToast('Map ready · GPS tracking active');
  }
}

// ── PINS ──────────────────────────────────────────────────────────────────
function drawPin(h, pos) {
  if (pinM[h]) map.removeLayer(pinM[h]);
  const icon = L.divIcon({
    className: '',
    html: '<div style="background:#c9a84c;color:#0a140c;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:10px;font-weight:bold;border:2px solid rgba(0,0,0,0.5);box-shadow:0 2px 6px rgba(0,0,0,0.7)">' + h + '</div>',
    iconSize: [22, 22], iconAnchor: [11, 11]
  });
  pinM[h] = L.marker(pos, { icon, zIndexOffset: 500 }).addTo(map);
}

function drawTee(h, pos) {
  if (teeM[h]) map.removeLayer(teeM[h]);
  const cols = { black: '#222', blue: '#4a90e2', white: '#f5f5f5', red: '#e05555' };
  const icon = L.divIcon({
    className: '',
    html: '<div style="background:' + (cols[teeColor] || '#f5f5f5') + ';border:2px solid rgba(0,0,0,0.5);border-radius:3px;width:16px;height:16px;box-shadow:0 2px 6px rgba(0,0,0,0.7)"></div>',
    iconSize: [16, 16], iconAnchor: [8, 8]
  });
  teeM[h] = L.marker(pos, { icon, zIndexOffset: 400 }).addTo(map);
}

function setPin() {
  if (!currentPos) { showToast('Waiting for GPS...'); return; }
  pins[hole] = [...currentPos];
  drawPin(hole, currentPos);
  saveLib();
  document.getElementById('btn-pin').classList.add('on');
  buildHoleStrip();
  updateDist();
  showToast('Pin set — Hole ' + hole);
}

// ── HOLE STRIP ────────────────────────────────────────────────────────────
function buildHoleStrip() {
  const el = document.getElementById('hole-strip');
  el.innerHTML = '';
  for (let i = 1; i <= 18; i++) {
    const done = shots.some(s => s.hole === i);
    const hp = !!pins[i];
    const p = document.createElement('button');
    p.className = 'hpill' + (i === hole ? ' cur' : done ? ' done' : hp ? ' has-pin' : '');
    p.id = 'hpill-' + i;
    p.textContent = i + (hp ? '●' : '');
    p.onclick = (function(h) { return function() { jumpHole(h); }; })(i);
    el.appendChild(p);
  }
}

function jumpHole(h) {
  hole = h;
  document.getElementById('h-num').textContent = h;
  document.querySelectorAll('.hpill').forEach(p => p.classList.remove('cur'));
  const pill = document.getElementById('hpill-' + h);
  if (pill) { pill.classList.add('cur'); pill.scrollIntoView({ inline: 'center', behavior: 'smooth' }); }
  document.getElementById('btn-pin').classList.toggle('on', !!pins[h]);
  if (pins[h]) map.setView(pins[h], 18);
  else if (tees[h]) map.setView(tees[h], 18);
  updateDist();
  showToast('Hole ' + h);
}

// ── DIST TO PIN ────────────────────────────────────────────────────────────
function updateDist() {
  const pin = pins[hole];
  if (!pin || !currentPos) { document.getElementById('dist-box').style.display = 'none'; return; }
  const d = Math.round(hvy(currentPos, pin));
  const pl = playsLike(d);
  document.getElementById('dist-num').textContent = d;
  document.getElementById('dist-plays').textContent = pl + 'y plays like';
  document.getElementById('dist-box').style.display = 'block';
  document.getElementById('wx-plv').textContent = pl + 'y';
  document.getElementById('wx-pl').style.display = '';
}

// ── MEASURE ────────────────────────────────────────────────────────────────
function toggleMeasure() {
  measMode = !measMode;
  const btn = document.getElementById('btn-meas');
  const box = document.getElementById('meas-box');
  if (measMode) {
    btn.classList.add('on'); box.style.display = 'block';
    if (currentPos) {
      measMarker.setLatLng(currentPos);
      measMarker.addTo(map);
      measLine = L.polyline([currentPos, currentPos], { color: '#4a90e2', weight: 2, dashArray: '6 4', opacity: 0.8 }).addTo(map);
    }
    showToast('Drag blue dot to measure');
  } else {
    btn.classList.remove('on'); box.style.display = 'none';
    if (map.hasLayer(measMarker)) map.removeLayer(measMarker);
    if (measLine) { map.removeLayer(measLine); measLine = null; }
  }
}

function onMeasDrag() {
  if (!currentPos) return;
  const mp = measMarker.getLatLng();
  const d = Math.round(hvy(currentPos, [mp.lat, mp.lng]));
  document.getElementById('meas-num').textContent = d;
  if (measLine) measLine.setLatLngs([currentPos, [mp.lat, mp.lng]]);
}

// ── RINGS ─────────────────────────────────────────────────────────────────
function toggleRings() {
  if (!currentPos) { showToast('Waiting for GPS...'); return; }
  if (ringsOn) {
    rings.forEach(r => map.removeLayer(r)); rings = []; ringsOn = false; showToast('Rings off');
  } else {
    [50, 100, 150, 200].forEach(function(y, i) {
      const cols = ['#9b59b6', '#3aaf5c', '#c9a84c', '#4a90e2'];
      const ring = L.circle(currentPos, { radius: y * 0.9144, color: cols[i], weight: 1.5, opacity: 0.8, fillColor: cols[i], fillOpacity: 0.04 }).addTo(map);
      ring.bindTooltip(y + 'y', { permanent: true, direction: 'top' });
      rings.push(ring);
    });
    ringsOn = true; showToast('Distance rings on');
  }
}

// ── SHOT CAT ──────────────────────────────────────────────────────────────
function getCat(cl, dist) {
  if (hShots.length === 0) return 'tee';
  if (cl === 'Putter') return 'putt';
  if (dist !== null && dist < 40) return 'chip';
  if (['SW','LW','GW'].includes(cl) && dist < 60) return 'chip';
  return 'approach';
}

function updateCat() {
  if (!lastPos || !currentPos) { document.getElementById('cat-txt').textContent = hShots.length === 0 ? 'TEE' : '—'; return; }
  document.getElementById('cat-txt').textContent = getCat(club, Math.round(hvy(lastPos, currentPos))).toUpperCase();
}

// ── TRACK ─────────────────────────────────────────────────────────────────
const CAT_COL = { tee: '#4a90e2', approach: '#3aaf5c', chip: '#c9a84c', putt: '#9b59b6' };

function trackShot() {
  if (!currentPos) { showToast('Waiting for GPS...'); return; }
  const sn = hShots.length + 1;
  let dy = 0;
  if (lastPos) {
    dy = Math.round(hvy(lastPos, currentPos));
    sLines.push(L.polyline([lastPos, currentPos], { color: '#3aaf5c', weight: 3, opacity: 0.85 }).addTo(map));
  }
  const d2 = lastPos ? Math.round(hvy(lastPos, currentPos)) : null;
  const cat = getCat(club, d2);
  const pin = pins[hole];
  const dtp = pin ? Math.round(hvy(currentPos, pin)) : null;
  const col = CAT_COL[cat] || '#c9a84c';
  const icon = L.divIcon({
    className: '',
    html: '<div style="background:' + col + ';color:#0a140c;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:12px;font-weight:bold;border:2px solid rgba(0,0,0,0.5);box-shadow:0 2px 8px rgba(0,0,0,0.6)">' + sn + '</div>',
    iconSize: [28, 28], iconAnchor: [14, 14]
  });
  const marker = L.marker(currentPos, { icon }).addTo(map);
  marker.bindPopup('Shot ' + sn + ': ' + club + ' · ' + cat + (dy > 0 ? ' · ' + dy + 'y' : ''));
  sMarkers.push(marker);
  const shot = { hole, shotNum: sn, club, lat: currentPos[0], lng: currentPos[1], distYards: dy, category: cat, distToPin: dtp, playsLike: playsLike(dy) };
  hShots.push(shot); shots.push(shot); lastPos = [...currentPos];
  updateSG();
  showToast(cat.toUpperCase() + ' · ' + club + (dy > 0 ? ' · ' + dy + 'y' : ''));
}

function undoShot() {
  if (!hShots.length) { showToast('No shots to undo'); return; }
  hShots.pop(); shots.pop();
  const m = sMarkers.pop(); if (m) map.removeLayer(m);
  const l = sLines.pop(); if (l) map.removeLayer(l);
  lastPos = hShots.length ? [hShots[hShots.length-1].lat, hShots[hShots.length-1].lng] : null;
  updateSG(); showToast('Shot removed');
}

function nextHole() {
  if (!hShots.length) { showToast('Track a shot first'); return; }
  hShots = []; lastPos = null; hole++;
  document.getElementById('h-num').textContent = hole;
  document.getElementById('btn-pin').classList.remove('on');
  buildHoleStrip();
  const pill = document.getElementById('hpill-' + hole);
  if (pill) pill.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  if (pins[hole]) map.setView(pins[hole], 18);
  updateDist(); updateCat();
  showToast('Hole ' + hole);
}

function exitRound() {
  if (shots.length && !confirm('Leave round?')) return;
  saveLib();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('home-page').classList.add('active');
  filterList(); renderSaved();
}

// ── SG ────────────────────────────────────────────────────────────────────
function getSGB(cat, d) {
  const t = SG_BASE[cat] || SG_BASE.approach;
  const keys = Object.keys(t).map(Number).sort((a,b) => a-b);
  if (d <= keys[0]) return t[keys[0]];
  if (d >= keys[keys.length-1]) return t[keys[keys.length-1]];
  for (let i = 0; i < keys.length-1; i++) {
    if (d >= keys[i] && d <= keys[i+1]) {
      const p = (d - keys[i]) / (keys[i+1] - keys[i]);
      return t[keys[i]] + p * (t[keys[i+1]] - t[keys[i]]);
    }
  }
  return 2.5;
}

function calcSG(s, next) {
  const b = getSGB(s.category, s.distToPin || 150);
  if (!next) return 0;
  const a = getSGB(next.category, next.distToPin || 10);
  return parseFloat((b - (1 + a)).toFixed(2));
}

function updateSG() {
  let sg = 0;
  for (let i = 0; i < shots.length-1; i++) sg += calcSG(shots[i], shots[i+1]);
  const el = document.getElementById('sg-num');
  el.textContent = (sg >= 0 ? '+' : '') + sg.toFixed(1);
  el.style.color = sg >= 0 ? '#3aaf5c' : '#e05555';
}

// ── OVERLAYS ──────────────────────────────────────────────────────────────
function openOv(id) {
  if (id === 'sc-ov') buildSC();
  if (id === 'stats-ov') buildStats();
  document.getElementById(id).classList.add('open');
}
function closeOv(id) { document.getElementById(id).classList.remove('open'); }

function buildSC() {
  const body = document.getElementById('sc-body');
  if (!shots.length) { body.innerHTML = '<p style="color:rgba(255,255,255,0.25);text-align:center;padding:40px 0;font-family:DM Mono,monospace;font-size:12px">No shots yet</p>'; return; }
  const bh = {};
  shots.forEach(s => { if (!bh[s.hole]) bh[s.hole] = []; bh[s.hole].push(s); });
  body.innerHTML = Object.entries(bh).map(function([h, hs]) {
    const td = hs.reduce((a,s) => a+s.distYards, 0);
    const putts = hs.filter(s => s.category==='putt').length;
    return '<div class="hcard"><div class="hcard-top"><div class="hcard-num">HOLE ' + h + '</div><div class="hcard-meta">' + hs.length + ' shots · ' + putts + 'p · ' + td + 'y</div></div>' +
      hs.map(function(s, i) {
        const sg = i < hs.length-1 ? calcSG(s, hs[i+1]) : 0;
        return '<div class="srow"><span class="sbadge ' + s.category + '">' + s.category + '</span><span>' + s.club + '</span><span class="sdist">' + (s.distYards>0?s.distYards+'y':'—') + '</span><span class="sgv ' + (sg>=0?'pos':'neg') + '">' + (sg!==0?(sg>0?'+':'')+sg.toFixed(2):'') + '</span></div>';
      }).join('') + '</div>';
  }).join('') + '<button id="btn-export" onclick="exportRound()">EXPORT CSV</button>';
}

function buildStats() {
  const body = document.getElementById('stats-body');
  if (!shots.length) { body.innerHTML = '<p style="color:rgba(255,255,255,0.25);text-align:center;padding:40px 0;font-family:DM Mono,monospace;font-size:12px">No shots yet</p>'; return; }
  const tees2 = shots.filter(s=>s.category==='tee');
  const apps = shots.filter(s=>s.category==='approach');
  const chips = shots.filter(s=>s.category==='chip');
  const putts = shots.filter(s=>s.category==='putt');
  let sgT=0, sgA=0, sgC=0, sgP=0, sgTot=0;
  for (let i=0; i<shots.length-1; i++) {
    const sg = calcSG(shots[i], shots[i+1]); sgTot+=sg;
    if (shots[i].category==='tee') sgT+=sg;
    else if (shots[i].category==='approach') sgA+=sg;
    else if (shots[i].category==='chip') sgC+=sg;
    else if (shots[i].category==='putt') sgP+=sg;
  }
  const avgDr = tees2.length ? Math.round(tees2.reduce((a,s)=>a+s.distYards,0)/tees2.length) : 0;
  const h2 = Math.max(hole-1, 1);
  function bar(l, v) {
    const p = Math.min(Math.abs(v)/1.5*100, 100);
    return '<div class="sg-row"><div class="sg-lbl">'+l+'</div><div class="sg-track"><div class="sg-fill '+(v>=0?'pos':'neg')+'" style="width:'+p+'%"></div></div><div class="sg-n '+(v>=0?'pos':'neg')+'">'+(v>=0?'+':'')+v.toFixed(2)+'</div></div>';
  }
  body.innerHTML = '<div class="stat-grid"><div class="stat-c"><div class="stat-v">'+shots.length+'</div><div class="stat-l">Total Shots</div></div><div class="stat-c"><div class="stat-v">'+(putts.length/h2).toFixed(1)+'</div><div class="stat-l">Putts/Hole</div></div><div class="stat-c"><div class="stat-v">'+(avgDr>0?avgDr+'y':'—')+'</div><div class="stat-l">Avg Drive</div></div><div class="stat-c"><div class="stat-v" style="color:'+(sgTot>=0?'#3aaf5c':'#e05555')+'">'+(sgTot>=0?'+':'')+sgTot.toFixed(1)+'</div><div class="stat-l">Total SG</div></div></div><div class="sg-block"><div class="sg-ttl">STROKES GAINED</div>'+bar('Off Tee',sgT)+bar('Approach',sgA)+bar('Chipping',sgC)+bar('Putting',sgP)+'</div>';
}

function exportRound() {
  if (!shots.length) { showToast('No shots'); return; }
  let csv = 'Caddie\n' + (activeCourse ? activeCourse.n : 'Round') + '\n' + new Date().toLocaleDateString() + '\n\nHole,Shot,Cat,Club,Yards,PlaysLike,DistToPin,Lat,Lng\n';
  shots.forEach(function(s) { csv += s.hole+','+s.shotNum+','+s.category+','+s.club+','+s.distYards+','+(s.playsLike||'')+','+(s.distToPin||'')+','+s.lat.toFixed(6)+','+s.lng.toFixed(6)+'\n'; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'caddie_round.csv';
  a.click();
  showToast('Exported');
}

// ── CLUBS ─────────────────────────────────────────────────────────────────
function buildClubs() {
  const el = document.getElementById('clubs'); el.innerHTML = '';
  CLUBS.forEach(function(c) {
    const btn = document.createElement('button');
    btn.className = 'cbt' + (c === club ? ' on' : '');
    btn.textContent = c;
    btn.onclick = function() { club = c; document.querySelectorAll('.cbt').forEach(b => b.classList.toggle('on', b.textContent===c)); updateCat(); };
    el.appendChild(btn);
  });
}

// ── SAVE ──────────────────────────────────────────────────────────────────
function saveLib() {
  if (!activeCourse) return;
  activeCourse.pins = pins;
  activeCourse.tees = tees;
  localStorage.setItem('caddie_lib', JSON.stringify(lib));
}
function saveCourse() { saveLib(); showToast('Course saved'); }

// ── UTILS ─────────────────────────────────────────────────────────────────
function hvy(a, b) {
  const R=6371000, dL=(b[0]-a[0])*Math.PI/180, dG=(b[1]-a[1])*Math.PI/180;
  const x = Math.sin(dL/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x)) * 1.09361;
}

let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

// ── INIT ──────────────────────────────────────────────────────────────────
filterList();
renderSaved();
</script>
